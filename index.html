<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeaverRush — Prototype</title>
  <style>
    /* Letterbox: nền đen, canvas căn giữa, giữ tỉ lệ 9:16 */
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #111;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      background: #2f6d8a;
      image-rendering: auto;
      touch-action: none;         /* pointer events tự xử lý tap/drag (§A6) */
      -webkit-user-select: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script type="module" src="src/main.js"></script>
</body>
</html>
